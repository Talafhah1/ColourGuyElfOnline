<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColourGuyElf Online — Brawlhalla Colour Scheme Editor</title>
  <meta name="description" content="Visual colour scheme editor for Brawlhalla ColorSchemeTypes with live preview, code export, and sharing.">
  <link rel="icon" href="favicon.png">

  <!-- CodeMirror 5 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/properties/properties.min.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ======== Header ======== -->
  <header class="header">
    <div class="header-logo">
      <img src="favicon.png" alt="" class="header-logo-img" width="24" height="24">
      <span class="header-title">ColourGuyElf <span class="header-title-thin">Online</span></span>
    </div>
    <button id="btn-theme" class="btn btn-icon-only" type="button" title="Toggle theme"></button>
  </header>

  <!-- ======== Toolbar ======== -->
  <div class="toolbar">
    <div class="toolbar-group">
      <div id="game-dd"></div>
      <div id="saved-dd"></div>
      <button id="btn-save" class="btn" type="button" title="Save to browser"><span class="btn-icon"></span><span class="btn-label">Save</span></button>
      <button id="btn-delete" class="btn btn-danger" type="button" title="Delete saved scheme"><span class="btn-icon"></span><span class="btn-label">Delete</span></button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="btn-load" class="btn" type="button" title="Load from editor"><span class="btn-icon"></span><span class="btn-label">Load</span></button>
      <button id="btn-format" class="btn btn-format-fixed" type="button" title="Toggle format"><span class="btn-icon"></span><span class="btn-label">XML</span></button>
      <button id="btn-generate" class="btn" type="button" title="Generate to editor"><span class="btn-icon"></span><span class="btn-label">Generate</span></button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="btn-randomise" class="btn" type="button" title="Randomise colours"><span class="btn-icon"></span><span class="btn-label">Randomise</span></button>
      <button id="btn-shade" class="btn" type="button" title="Auto shade from base colours"><span class="btn-icon"></span><span class="btn-label">Auto Shade</span></button>
      <button id="btn-gradient" class="btn" type="button" title="Gradient from lightest to darkest"><span class="btn-icon"></span><span class="btn-label">Gradient</span></button>
      <button id="btn-invert" class="btn" type="button" title="Invert all colours"><span class="btn-icon"></span><span class="btn-label">Invert</span></button>
      <button id="btn-hueshift" class="btn" type="button" title="Shift hue +30°"><span class="btn-icon"></span><span class="btn-label">Hue Shift</span></button>
      <button id="btn-desat" class="btn" type="button" title="Desaturate to greyscale"><span class="btn-icon"></span><span class="btn-label">Greyscale</span></button>
      <button id="btn-posterise" class="btn" type="button" title="Posterise (4 levels)"><span class="btn-icon"></span><span class="btn-label">Posterise</span></button>
      <button id="btn-shuffle" class="btn" type="button" title="Rotate channels R→G→B"><span class="btn-icon"></span><span class="btn-label">Shuffle</span></button>
      <button id="btn-harmonise" class="btn" type="button" title="Harmonise all hues"><span class="btn-icon"></span><span class="btn-label">Harmonise</span></button>
    </div>
  </div>

  <!-- ======== Main 3-column layout ======== -->
  <main class="app-main">

    <!-- Left: Colour Picker -->
    <aside class="panel panel-picker">
      <h2 class="panel-title">Colour Picker</h2>
      <div id="picker-panel"></div>
    </aside>

    <!-- Centre: Colour Grid (hero) -->
    <section class="panel panel-grid">
      <div id="grid-panel"></div>
      <div class="grid-history" aria-label="Colour history timeline">
        <button id="btn-undo" class="btn btn-sm btn-icon-only" type="button" title="Undo" disabled>
          <span class="btn-icon"></span>
        </button>
        <div id="history-strip" class="history-strip" role="list" aria-label="History states"></div>
        <button id="btn-redo" class="btn btn-sm btn-icon-only" type="button" title="Redo" disabled>
          <span class="btn-icon"></span>
        </button>
      </div>
    </section>

    <!-- Right: Code Editor -->
    <aside class="panel panel-editor">
      <h2 class="panel-title">Code Editor</h2>
      <div class="editor-wrap">
        <textarea id="editor-textarea"></textarea>
      </div>
      <div class="editor-actions">
        <button id="btn-share" class="btn btn-sm" type="button" title="Copy share link"><span class="btn-icon"></span><span class="btn-label">Share</span></button>
        <button id="btn-copy" class="btn btn-sm" type="button" title="Copy code"><span class="btn-icon"></span><span class="btn-label">Copy</span></button>
        <button id="btn-download" class="btn btn-sm" type="button" title="Download file"><span class="btn-icon"></span><span class="btn-label">Download</span></button>
      </div>
    </aside>
  </main>

  <!-- ======== Save Modal ======== -->
  <div id="save-modal" class="modal-overlay">
    <div id="save-modal-backdrop" class="modal-backdrop"></div>
    <div class="modal">
      <h3 class="modal-title">Save Colour Scheme</h3>
      <input id="save-name-input" type="text" class="modal-input" placeholder="Scheme name…" maxlength="60">
      <div class="modal-actions">
        <button id="save-cancel" class="btn btn-sm" type="button">Cancel</button>
        <button id="save-confirm" class="btn btn-sm btn-primary" type="button">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
